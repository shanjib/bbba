<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standings — BBBA</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div id="site-header-placeholder"></div>

  <main class="page-wrap">
    <div class="page-hero">
      <h1 class="page-title">Stan<span>dings</span></h1>
      <p class="page-subtitle">Tiebreaker: head-to-head record, then head-to-head point differential</p>
    </div>

    <div id="season-switcher" class="season-switcher-wrap"></div>

    <div class="standings-wrap">
      <table class="standings-table">
        <thead>
          <tr>
            <th>#</th>
            <th class="team-col">Team</th>
            <th>W</th>
            <th>L</th>
            <th>Win%</th>
            <th>PF</th>
            <th>PA</th>
            <th>DIFF</th>
          </tr>
        </thead>
        <tbody id="standings-body"></tbody>
      </table>
    </div>
    <p class="standings-note">PF = Points For &nbsp;·&nbsp; PA = Points Against &nbsp;·&nbsp; DIFF = Point Differential</p>
  </main>

  <div id="site-footer-placeholder"></div>

  <script src="js/config.js"></script>
  <script src="js/players.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
