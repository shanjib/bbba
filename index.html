<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BBBA — Boston Bengali Basketball Association</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div id="site-header-placeholder"></div>

  <main class="page-wrap">

    <div class="about-hero">
      <div class="about-hero-title">Boston Bengali Basketball Association</div>
      <div class="about-hero-tagline league-tagline"></div>
      <p class="about-hero-text" id="about-text"></p>
    </div>

    <div class="quick-stats" id="league-quick-stats"></div>

    <div class="card">
      <h2 style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--green-dark);letter-spacing:1px;margin-bottom:12px;">
        Season <span class="current-season-label"></span>
      </h2>
      <p style="font-size:15px;line-height:1.75;color:var(--ink-soft);">
        Welcome to the official home of the BBBA. Follow the season here — check the schedule for upcoming games,
        watch the standings update in real time, and dig into stats after every game. Let's ball! 🏀
      </p>
    </div>

  </main>

  <div id="site-footer-placeholder"></div>

  <script src="js/config.js"></script>
  <script src="js/players.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
